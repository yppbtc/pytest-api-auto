[pytest]
;addopts = -vs --alluredir ./report/temp -p no:warnings --clean-alluredir
;
;testpaths = ./testcase/

filterwarnings =
    error
    ignore::UserWarning

python_files = test_*.py

python_classes = Test*

python_functions = test


; 当面试官问你"这个项目的测试框架是怎么配置的？"，你可以这样回答：
; "项目使用 pytest 框架，通过 pytest.ini 配置测试文件的匹配规则，通过 conftest.py 定义各种 fixtures。
; 全局的 conftest.py 负责测试前的数据清理，testcase 目录下的 conftest.py 负责登录和数据库操作。
; 使用 session 级别的 fixture 实现登录复用，使用 function 级别的 fixture 实现每个测试的前后置操作，这样可以大大提高测试效率。"
; 此外，每个测试函数执行前后都会打印日志，便于追踪测试执行情况。"